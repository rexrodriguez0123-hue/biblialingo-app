name: biblialingo_app
description: A new Flutter project for BibliaLingo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  google_sign_in: ^7.2.0
  just_audio: ^0.9.34

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/clouds/
    - assets/audio/
